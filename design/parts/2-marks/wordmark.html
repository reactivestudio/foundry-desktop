<style>
  /* ЗНАК «Foundry AI» — построение из эталона candidates/logo.html, снятого
     с приветствия онбординга в момент, когда знак был сформирован и принят
     (2026-07-17). Разница с эталоном только в оправе: там свой :root и сырые
     хексы, здесь — токены и scope. Числа не трогались.

     Применение: <span class="logo">Foundry<span class="mark-ai">AI</span></span>
     и при необходимости --logo-size. Больше ничего. */

  .p-wordmark { flex-direction: column; align-items: flex-start; }
  .p-wordmark .group { display: flex; flex-direction: column; gap: var(--space-1); }

  .p-wordmark .logo {
    display: inline-flex; align-items: flex-start; gap: calc(9em / 34);
    /* Базовый кегль знака — type.hero; --logo-size его переопределяет, и знак
       едет целиком, потому что всё внутри считается em-ами от этого кегля. */
    font-size: var(--logo-size, var(--type-hero-size));
    font-weight: var(--type-hero-weight);
    letter-spacing: var(--type-hero-tracking);
    /* Интерлиньяж отношением, а не токеном: 40/34 обязан пережить смену
       --logo-size, а токен прибит к 34. Делить длины в calc() нельзя. */
    line-height: calc(40 / 34);
    color: var(--text-primary);
    /* var(--font-text) отдаёт системный SF с живой оптической осью: на кегле
       ≥20pt macOS сама переключает Text → Display, и знак держится именно на
       этом переходе (04 §2.1, memory/foundry-wordmark-sf-display.md). Порядок
       внутри токена это и охраняет — см. font._role. */
    font-family: var(--font-text);
  }

  /* Лейбл: плашка залита янтарём, литеры — цветом bg.base (окно, просвечивающее
     сквозь вырез, — чернота обязана ездить вместе с фоном). Поля посчитаны из
     замера краски по СРЕДНИМ расстояниям (на 34px: 2 сверху / 2.75 снизу,
     4.5 слева / 5 справа; бока раздвинуты на +2px решением), радиус 0.6em —
     это 6px на базовом кегле, то есть radius.m; токеном он не берётся нарочно:
     токен прибит к 6px, а знак обязан масштабироваться целиком.
     Тело — градиент по янтарю: макушка светлее, низ глубже и на 6° в оранжевое;
     оба конца выведены из brand.amber относительным oklch, а не вписаны рядом.
     Сверху внутри — блик в полпикселя. Литеры вдавлены в плашку: под ними 1px
     света без размытия — освещённая нижняя губка выреза, «AI» выбито в янтаре.
     Белые с альфой в блике и в вдавливании — сырые сознательно: это свет, а не
     текст и не бордер; токена «белый 45%» в системе нет, и заводить его ради
     двух значений внутри знака было бы враньём про роль. */
  .p-wordmark .mark-ai {
    font-size: calc(10em / 34); line-height: 1; font-weight: 700; letter-spacing: 0.06em;
    color: var(--bg-base); border-radius: 0.6em;
    padding: 0.2em calc(0.5em - 0.06em) 0.275em 0.45em;
    margin-top: 0.5em; flex: none;
    background: linear-gradient(180deg,
      oklch(from var(--brand-amber) calc(l + 0.035) c h) 0%,
      var(--brand-amber) 55%,
      oklch(from var(--brand-amber) calc(l - 0.03) c calc(h - 6)) 100%);
    box-shadow: inset 0 0.05em 0 rgba(255,255,255,0.45);
    text-shadow: 0 0.1em 0 rgba(255,255,255,0.35);
  }

  /* Второй кегль — не вариант знака, а доказательство инварианта: меры едут
     в em, поля не перенастраиваются. Ровно вдвое от базового — множитель
     здесь и есть предмет показа, поэтому он написан, а не спрятан. */
  .p-wordmark .twice { --logo-size: calc(var(--type-hero-size) * 2); }
</style>
